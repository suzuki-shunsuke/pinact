---
name: integration test
on:
  workflow_call:
    secrets:
      TAKUMI_GUARD_BOT_ID:
        required: true

jobs:
  integration-test:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
        env:
          AQUA_GITHUB_TOKEN: ${{github.token}}
      - run: rm "$(aqua root-dir)/bin/pinact"
      - run: |
          go install \
            -ldflags "-X main.version=v1.0.0 -X main.commit=$GITHUB_SHA -X main.date=$(date +"%Y-%m-%dT%H:%M:%SZ%:z" | tr -d '+')" \
            ./cmd/pinact
      - run: pinact -v
      - run: |
          if pinact run --check testdata/foo.yaml; then
            echo "::error:: pinact run --check should fail"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{github.token}}

      - run: |
          if ! git diff --exit-code testdata/foo.yaml; then
            echo "::error:: pinact run --check should not change files"
            exit 1
          fi

      - run: pinact run testdata/foo.yaml
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: diff testdata/foo.yaml testdata/foo_after.yaml

      - run: git checkout -- testdata/foo.yaml
      - run: pinact run -i "^actions/checkout$" testdata/foo.yaml
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: diff testdata/foo.yaml testdata/foo_include_after.yaml

      - run: git checkout -- testdata/foo.yaml
      - run: pinact run -e "^actions/checkout$" testdata/foo.yaml
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: diff testdata/foo.yaml testdata/foo_exclude_after.yaml

      - name: Test separator
        run: pinact run testdata/separator/foo.yaml
        env:
          GITHUB_TOKEN: ${{github.token}}
          PINACT_CONFIG: testdata/separator/pinact.yaml
      - run: diff testdata/separator/foo.yaml testdata/separator/foo_after.yaml

      - run: pinact run
        working-directory: testdata/actions
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: diff -r testdata/actions testdata/actions.after

      - run: pinact migrate
        working-directory: testdata/migrate
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: diff .pinact.yaml pinact.yaml.after
        working-directory: testdata/migrate

      # Test --diff-file
      # 1. actions included in diff are pinned
      # 1. actions not included in diff aren't pinned
      - run: pinact run -diff-file testdata/diff-file/diff.txt testdata/diff-file/action.yaml
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: diff testdata/diff-file/action.yaml testdata/diff-file/action_after.yaml

      - run: pinact run -u
        env:
          GITHUB_TOKEN: ${{github.token}}
